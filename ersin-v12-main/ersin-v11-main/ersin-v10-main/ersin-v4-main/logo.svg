<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Arka plan (Opsiyonel: Sekmelerde daha belirgin olması için şeffaf ama dolgulu bir alan ekleyelim) -->
  
  <!-- Ana Kutu Şekli (Isometric Cube) -->
  <path d="M256 50 L80 150 V362 L256 462 L432 362 V150 Z" 
        fill="none" 
        stroke="#2563eb" 
        stroke-width="54" 
        stroke-linejoin="round" />
  
  <!-- İç Çizgiler (Boyut katıyor) -->
  <path d="M256 50 V256 M256 256 L80 150 M256 256 L432 150" 
        fill="none" 
        stroke="#2563eb" 
        stroke-width="54" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Üst kısımdaki iki paralel çizgi detayı -->
  <path d="M185 145 L285 200 M227 121 L327 176" 
        fill="none" 
        stroke="#2563eb" 
        stroke-width="38" 
        stroke-linecap="round" />
</svg>
